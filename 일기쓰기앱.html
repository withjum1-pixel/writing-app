<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시간을 표현하는 낱말을 사용하여 글쓰기</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Gaegu',cursive;background:#f5f0e0;min-height:100vh;padding:16px;font-size:20px;}
.wrap{max-width:780px;margin:0 auto;}
h1.app-title{text-align:center;font-size:30px;color:#7a4f00;margin-bottom:14px;line-height:1.4;}

.student-bar{background:#fff;border:2px solid #d4b483;border-radius:12px;padding:12px 18px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px;}
.student-bar input,.student-bar select{border:none;border-bottom:1.5px solid #ccc;outline:none;font-family:'Gaegu',cursive;font-size:20px;background:transparent;color:#333;}
.si-school{width:130px;}
.si-grade{width:70px;}
.si-cls{width:45px;}
.si-num{width:45px;}
.si-name{width:80px;}
.sep{color:#ddd;font-size:18px;}

.diary-body{background:#fff;border:2.5px solid #d4b483;border-radius:14px;overflow:hidden;margin-bottom:12px;}
.diary-top{display:grid;grid-template-columns:1fr 1fr;border-bottom:1.5px solid #e8d5a0;}
.dt-left{padding:12px 16px;border-right:1.5px solid #e8d5a0;}
.dt-right{padding:12px 16px;}
.field-row{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.field-row:last-child{margin-bottom:0;}
.fl{font-size:17px;color:#888;white-space:nowrap;}
.ui{border:none;border-bottom:1.5px solid #bbb;outline:none;font-family:'Gaegu',cursive;font-size:20px;background:transparent;color:#333;}
.weather-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.w-icon{width:30px;height:30px;border:1.5px solid #ccc;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;user-select:none;}
.w-icon:hover{border-color:#f4c842;background:#fff8dc;}
.w-icon.on{border-color:#f4c842;background:#fff3cd;transform:scale(1.15);}
.now-time{font-size:12px;color:#aaa;margin-top:6px;}

/* 그림판 */
.draw-area{border-bottom:1.5px solid #e8d5a0;padding:10px 14px;background:#fffef8;}
.draw-area-title{font-size:14px;color:#888;margin-bottom:6px;}
.tool-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:6px;}
.tb{border:1.5px solid #ddd;border-radius:8px;padding:3px 9px;font-size:12px;font-family:'Gaegu',cursive;cursor:pointer;background:#fafafa;transition:all .15s;white-space:nowrap;}
.tb:hover{background:#eee;}
.tb.on{background:#fff3cd;border-color:#f4c842;}
.csw{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s;flex-shrink:0;}
.csw:hover{transform:scale(1.25);}
.csw.on{border-color:#222;transform:scale(1.2);box-shadow:0 0 0 1px #fff inset;}
.sl-wrap{display:flex;align-items:center;gap:4px;}
.sl-wrap label{font-size:11px;color:#aaa;white-space:nowrap;}
.sl-wrap input[type=range]{width:64px;accent-color:#f4c842;}
.sl-wrap span{font-size:11px;color:#888;min-width:30px;}
.custom-color{width:26px;height:26px;border:1.5px solid #ccc;border-radius:6px;cursor:pointer;padding:0;}
#penPreview{width:110px;height:26px;border:1px solid #eee;border-radius:6px;background:#fff;vertical-align:middle;}
#dc{width:100%;height:280px;border:1.5px solid #e8d5a0;border-radius:10px;display:block;touch-action:none;background:#fff;}

/* 낱말 */
.words-area{border-bottom:1.5px solid #e8d5a0;padding:10px 14px;background:#f0f8ff;}
.words-title{font-size:18px;color:#2a6a9e;margin-bottom:8px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip-cat{width:100%;font-size:15px;color:#7aaecc;margin-top:6px;margin-bottom:2px;}
.chip{background:#fff;border:1.5px solid #88bde0;border-radius:20px;padding:5px 15px;font-size:16px;color:#1a5a8a;cursor:pointer;user-select:none;transition:background .12s;}
.chip:hover{background:#cce5ff;}
.chip.used{background:#d4edda;border-color:#5cb85c;color:#1e6f1e;}

/* 글쓰기 */
.write-area{padding:12px 14px;}
.write-title{font-size:19px;color:#888;margin-bottom:8px;}
.lined-wrap{position:relative;}
.diary-ta{width:100%;min-height:340px;border:1.5px solid #e8d5a0;border-radius:10px;outline:none;font-family:'Gaegu',cursive;font-size:26px;line-height:1.9;background:#fffef8;resize:vertical;color:#222;padding:14px 16px;}
.diary-ta:focus{border-color:#f4c842;box-shadow:0 0 0 3px rgba(244,200,66,0.15);}
.char-count{font-size:13px;color:#bbb;text-align:right;margin-top:4px;}

.submit-btn{width:100%;padding:14px;background:#f4c842;border:none;border-radius:14px;font-size:20px;font-family:'Gaegu',cursive;font-weight:700;color:#7a4f00;cursor:pointer;transition:background .2s;margin-bottom:16px;}
.submit-btn:hover{background:#e0b230;}

.preview-wrap{display:none;background:#fff;border:2.5px solid #d4b483;border-radius:14px;overflow:hidden;margin-bottom:12px;}
.preview-head{background:linear-gradient(135deg,#fff9e6,#ffeeba);border-bottom:2px solid #d4b483;padding:14px 18px;}
.preview-head h2{font-size:22px;color:#7a4f00;margin-bottom:6px;}
.preview-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:15px;color:#666;}
.preview-body{padding:14px 18px;}
#previewCanvas{width:100%;border:1.5px solid #e8d5a0;border-radius:10px;display:block;}
.action-row{display:flex;gap:10px;padding:14px 18px;border-top:1.5px solid #e8d5a0;}
.act-btn{flex:1;padding:12px 6px;border:2px solid;border-radius:12px;font-size:16px;font-family:'Gaegu',cursive;font-weight:700;cursor:pointer;}
.act-btn:hover{opacity:.8;}
.btn-save{background:#e8f4fd;border-color:#3498db;color:#1a5f9e;}
.btn-print{background:#e8fde8;border-color:#27ae60;color:#1a6e30;}
.btn-back{background:#fff3cd;border-color:#f4c842;color:#7a4f00;}

@media print{
  *{margin:0!important;padding:0!important;box-sizing:border-box!important;}
  body{background:#fff!important;}
  /* 화면 요소 전부 숨김 */
  .wrap{visibility:hidden!important;}
  /* 인쇄 전용 div만 표시 */
  #printArea{
    visibility:visible!important;
    position:fixed!important;
    top:0;left:0;width:100%;height:100%;
    z-index:9999;
    background:#fff;
    display:flex!important;
    align-items:flex-start;
    justify-content:center;
  }
  #printArea img{
    width:100%;
    height:auto;
    max-height:100vh;
    object-fit:contain;
    display:block;
  }
  @page{size:portrait;margin:4mm;}
}
@media(max-width:520px){
  .diary-top{grid-template-columns:1fr;}
  .dt-left{border-right:none;border-bottom:1.5px solid #e8d5a0;}
  .preview-meta,.action-row{grid-template-columns:1fr;flex-direction:column;}
}
</style>
</head>
<body>
<div class="wrap">
<div id="captureTarget">
<h1 class="app-title">✏️ 시간을 표현하는 낱말을 사용하여 글쓰기</h1>

<!-- 학생정보: placeholder만 -->
<div class="student-bar">
  <input class="si-school" id="school" placeholder="학교 이름"/>
  <span class="sep">|</span>
  <select class="si-grade" id="grade">
    <option>3학년</option><option>1학년</option><option>2학년</option>
    <option>4학년</option><option>5학년</option><option>6학년</option>
  </select>
  <input class="si-cls" id="cls" placeholder="반" type="number" min="1" max="20"/>
  <span style="font-size:14px;color:#aaa;">반</span>
  <input class="si-num" id="num" placeholder="번" type="number" min="1" max="50"/>
  <span style="font-size:14px;color:#aaa;">번</span>
  <input class="si-name" id="uname" placeholder="이름"/>
</div>

<div class="diary-body" id="diaryBody">
  <!-- 날짜/시간/날씨 -->
  <div class="diary-top">
    <div class="dt-left">
      <div class="field-row">
        <input class="ui" id="fyear" style="width:50px" placeholder="년"/><span class="fl">년</span>
        <input class="ui" id="fmonth" style="width:28px" placeholder="월"/><span class="fl">월</span>
        <input class="ui" id="fday" style="width:28px" placeholder="일"/><span class="fl">일</span>
      </div>
      <div class="field-row">
        <span class="fl">요일</span>
        <input class="ui" id="fdow" style="width:80px" placeholder="요일"/>
      </div>
      <div class="field-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
        <span class="fl">날씨</span>
        <div class="weather-row" id="weatherRow">
          <div class="w-icon" data-w="☀️">☀️</div>
          <div class="w-icon" data-w="⛅">⛅</div>
          <div class="w-icon" data-w="☁️">☁️</div>
          <div class="w-icon" data-w="🌧️">🌧️</div>
          <div class="w-icon" data-w="⛈️">⛈️</div>
          <div class="w-icon" data-w="❄️">❄️</div>
          <div class="w-icon" data-w="🌈">🌈</div>
          <div class="w-icon" data-w="🌬️">🌬️</div>
        </div>
      </div>
    </div>
    <div class="dt-right">
      <div class="field-row">
        <span class="fl">일어난 시간</span>
        <input class="ui" id="fwake" style="width:120px" placeholder="오전 7시 30분"/>
      </div>
      <div class="field-row">
        <span class="fl">잠든 시간</span>
        <input class="ui" id="fsleep" style="width:120px" placeholder="오후 9시"/>
      </div>
      <div class="now-time" id="nowTime"></div>
    </div>
  </div>

  <!-- 그림판 -->
  <div class="draw-area">
    <div class="draw-area-title">🎨 오늘 있었던 일을 그려 보세요</div>

    <!-- 행1: 도구 -->
    <div class="tool-row">
      <button class="tb on" id="bPen"    onclick="setT('pen')">✏️ 펜</button>
      <button class="tb"    id="bBrush"  onclick="setT('brush')">🖌️ 붓</button>
      <button class="tb"    id="bCrayon" onclick="setT('crayon')">🖍️ 크레용</button>
      <button class="tb"    id="bMarker" onclick="setT('marker')">🖊️ 마커</button>
      <button class="tb"    id="bWater"  onclick="setT('water')">💧 수채화</button>
      <button class="tb"    id="bErase"  onclick="setT('erase')">🧹 지우개</button>
      <button class="tb"    id="bLine"   onclick="setT('line')">📏 직선</button>
      <button class="tb"    id="bRect"   onclick="setT('rect')">⬜ 사각형</button>
      <button class="tb"    id="bCirc"   onclick="setT('circ')">⭕ 원</button>
      <button class="tb"    id="bFill"   onclick="setT('fill')">🪣 색채우기</button>
      <button class="tb" onclick="undoC()" style="margin-left:auto;">↩️ 되돌리기</button>
      <button class="tb" onclick="clearC()">🗑️ 지우기</button>
    </div>

    <!-- 행2: 굵기·불투명도·커스텀색 -->
    <div class="tool-row">
      <div class="sl-wrap">
        <label>굵기</label>
        <input type="range" id="bsRange" min="1" max="50" value="8"
          oninput="bsz=+this.value;document.getElementById('bsLabel').textContent=bsz;updatePP()"/>
        <span id="bsLabel">8</span>
      </div>
      <div class="sl-wrap" style="margin-left:10px;">
        <label>불투명도</label>
        <input type="range" id="opRange" min="5" max="100" value="100"
          oninput="opacity=+this.value/100;document.getElementById('opLabel').textContent=this.value+'%';updatePP()"/>
        <span id="opLabel">100%</span>
      </div>
      <input type="color" class="custom-color" id="customColor" value="#e74c3c"
        title="직접 색 고르기" style="margin-left:10px;"
        oninput="pickColor(this.value)"/>
      <span style="font-size:11px;color:#aaa;margin-left:4px;">직접 고르기</span>
    </div>

    <!-- 행3: 펜 미리보기 + 팔레트 -->
    <div class="tool-row" style="align-items:center;gap:10px;">
      <canvas id="penPreview" width="110" height="26"></canvas>
      <div id="palette" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
    </div>

    <canvas id="dc"></canvas>
    <!-- 그리기/스크롤 전환 버튼 -->
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
      <button class="tb" id="drawModeBtn" onclick="setDrawMode(!drawMode)"
        style="font-size:14px;padding:6px 16px;background:#fafafa;">✏️ 그리기 시작</button>
      <span style="font-size:12px;color:#aaa;">← 버튼을 눌러야 터치로 그릴 수 있어요. 다시 누르면 스크롤 가능.</span>
    </div>
  </div>

  <!-- 낱말 -->
  <div class="words-area">
    <div class="words-title">⏰ 시간을 표현하는 낱말 보기 — 클릭하면 글에 들어가요!</div>
    <div class="chips" id="chips"></div>
  </div>

  <!-- 글쓰기 -->
  <div class="write-area">
    <div class="write-title">✍️ 글쓰기</div>
    <div class="lined-wrap">
      <textarea class="diary-ta" id="diaryTa"
        placeholder="시간을 표현하는 낱말을 넣어 글을 써 보세요.&#10;예) 오늘 오전 9시에 학교에 갔습니다. 작년 여름에는…"></textarea>
    </div>
    <div class="char-count" id="charCount">0자</div>
  </div>
</div><!-- /diary-body -->
</div><!-- /captureTarget -->

<!-- 입력화면에서도 바로 저장 가능 -->
<button id="quickSaveBtn" onclick="saveImg()" style="width:100%;padding:12px;font-size:18px;margin-bottom:8px;border-radius:10px;border:2px solid #3498db;background:#e8f4fd;color:#1a5f9e;font-family:'Gaegu',cursive;font-weight:700;cursor:pointer;">💾 지금 바로 저장하기 (입력화면 그대로)</button>

<button class="submit-btn" id="submitBtn" onclick="doSubmit()">📋 글 저장하기 (미리보기)</button>

<div class="preview-wrap" id="previewWrap">
  <div class="preview-head">
    <h2>✏️ 나의 글쓰기</h2>
    <div class="preview-meta" id="prevMeta"></div>
  </div>
  <div class="preview-body">
    <canvas id="previewCanvas"></canvas>
  </div>
  <div class="action-row">
    <button class="act-btn btn-save"  onclick="saveImg()">💾 저장하기</button>
    <button class="act-btn btn-print" onclick="printDiary()">🖨️ 출력하기</button>
    <button class="act-btn btn-back"  onclick="goBack()">✏️ 다시 고치기</button>
  </div>
</div>
</div>

<!-- 인쇄 전용 (평소 숨김, 출력시 표시) -->
<div id="printArea" style="display:none;">
  <img id="printImg" src="" alt="글쓰기" style="width:100%;height:auto;display:block;"/>
</div>

<script>
/* ── 날짜 ── */
(function(){
  const now=new Date();
  const days=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  document.getElementById('fyear').value=now.getFullYear();
  document.getElementById('fmonth').value=now.getMonth()+1;
  document.getElementById('fday').value=now.getDate();
  document.getElementById('fdow').value=days[now.getDay()];
  const h=now.getHours(),m=now.getMinutes(),ap=h<12?'오전':'오후',h12=h%12||12;
  document.getElementById('nowTime').textContent='현재: '+ap+' '+h12+'시 '+String(m).padStart(2,'0')+'분';
})();

/* ── 날씨 ── */
let selWeather='';
document.getElementById('weatherRow').querySelectorAll('.w-icon').forEach(el=>{
  el.onclick=()=>{document.querySelectorAll('.w-icon').forEach(e=>e.classList.remove('on'));el.classList.add('on');selWeather=el.dataset.w;};
});

/* ── 낱말 ── */
const GROUPS=[
  {cat:'오늘·내일·모레',words:['오늘','어제','그제','내일','모레','글피']},
  {cat:'며칠 전·후',words:['하루 전','이틀 전','사흘 전','나흘 전','며칠 전','일주일 전','한 달 전','일 년 전','하루 뒤','이틀 뒤','사흘 뒤','며칠 뒤','일주일 뒤','한 달 뒤','일 년 뒤']},
  {cat:'과거·현재·미래',words:['옛날','예전에','지난번에','아까','방금','지금','이따가','나중에','곧','그때']},
  {cat:'올해·작년',words:['올해','작년','재작년','내년','내후년']},
  {cat:'오전·오후 시각',words:['오전','오후','오전 6시에','오전 7시에','오전 8시에','오전 9시에','오전 10시에','오전 11시에','오전 ( )시에','오후 12시에','오후 1시에','오후 2시에','오후 3시에','오후 4시에','오후 5시에','오후 6시에','오후 9시에','오후 ( )시에']},
  {cat:'아침·점심·저녁·밤',words:['아침에','점심에','저녁에','밤에','새벽에','자정에','한밤중에']},
  {cat:'이번 주·지난주',words:['이번 주에','지난주에','다음 주에','저번 주에','2주 전에','2주 후에']},
  {cat:'요일',words:['월요일에','화요일에','수요일에','목요일에','금요일에','토요일에','일요일에']},
  {cat:'시간 단위',words:['30분 전에','1시간 전에','2시간 전에','30분 후에','1시간 후에','7시 30분에','8시 30분에','( )시 ( )분에']},
];
const chipsEl=document.getElementById('chips');
GROUPS.forEach(g=>{
  const ce=document.createElement('div');ce.className='chip-cat';ce.textContent='▸ '+g.cat;chipsEl.appendChild(ce);
  g.words.forEach(w=>{
    const c=document.createElement('span');c.className='chip';c.textContent=w;
    c.onclick=()=>{
      const ta=document.getElementById('diaryTa'),s=ta.selectionStart,e=ta.selectionEnd;
      ta.value=ta.value.slice(0,s)+w+ta.value.slice(e);ta.focus();ta.selectionStart=ta.selectionEnd=s+w.length;
      c.classList.add('used');updateCount();
    };
    chipsEl.appendChild(c);
  });
});
function updateCount(){document.getElementById('charCount').textContent=document.getElementById('diaryTa').value.length+'자';}
document.getElementById('diaryTa').addEventListener('input',updateCount);

/* ══════ 그림판 ══════ */
const dc=document.getElementById('dc');
const dctx=dc.getContext('2d',{willReadFrequently:true});
let drawing=false,tool='pen',color='#e74c3c',bsz=8,opacity=1.0,snap,sx,sy,lastX,lastY;
let undoStack=[];
const MAX_UNDO=20;
const DPR=window.devicePixelRatio||1;
let CW=700,CH=280;

/* 팔레트 — 5줄 x 6 = 30색 */
const COLORS=[
  '#000000','#333333','#666666','#999999','#cccccc','#ffffff',
  '#ff0000','#ff6600','#ffcc00','#ffff00','#99cc00','#00cc00',
  '#00cccc','#0066ff','#0000cc','#6600cc','#cc00cc','#ff0099',
  '#ff9999','#ffcc99','#ffff99','#ccffcc','#99ccff','#cc99ff',
  '#8B4513','#d2691e','#f4a460','#ffdead','#ffe4b5','#fff8dc',
];
const palEl=document.getElementById('palette');
COLORS.forEach(c=>{
  const sw=document.createElement('div');
  sw.className='csw';sw.style.background=c;sw.title=c;
  if(c==='#ffffff')sw.style.boxShadow='inset 0 0 0 1px #bbb';
  sw.onclick=()=>{selectColor(c);sw.classList.add('on');};
  palEl.appendChild(sw);
});
// 기본 선택
palEl.querySelectorAll('.csw')[6].classList.add('on');

function selectColor(c){
  color=c;
  document.querySelectorAll('.csw').forEach(s=>s.classList.remove('on'));
  document.getElementById('customColor').value=c.length===7?c:'#e74c3c';
  if(tool==='erase')setT('pen');
  updatePP();
}
function pickColor(c){
  color=c;
  document.querySelectorAll('.csw').forEach(s=>s.classList.remove('on'));
  updatePP();
}

/* 캔버스 초기화 — 내용 보존 */
let savedImageData = null;
function initCanvas(preserve){
  const rect=dc.getBoundingClientRect();
  const newW=rect.width||700;
  if(preserve && savedImageData){
    // 크기가 같으면 그냥 복원
    if(Math.round(newW)===CW){dctx.putImageData(savedImageData,0,0);return;}
  }
  CW=Math.round(newW);CH=280;
  dc.width=Math.round(CW*DPR);dc.height=Math.round(CH*DPR);
  dctx.setTransform(DPR,0,0,DPR,0,0);
  dctx.fillStyle='#ffffff';dctx.fillRect(0,0,CW,CH);
  if(preserve && savedImageData){
    dctx.putImageData(savedImageData,0,0);
  }
  undoStack=[];updatePP();
}
setTimeout(()=>initCanvas(false),130);
window.addEventListener('resize',()=>{
  savedImageData=dctx.getImageData(0,0,dc.width,dc.height);
  setTimeout(()=>initCanvas(true),100);
});

/* 펜 미리보기 */
function updatePP(){
  const pv=document.getElementById('penPreview');
  const pc=pv.getContext('2d');
  pc.clearRect(0,0,110,26);
  pc.save();applyStyle(pc,tool,color,Math.min(bsz,12),opacity);
  pc.beginPath();pc.moveTo(6,22);pc.bezierCurveTo(30,6,80,22,104,8);pc.stroke();
  pc.restore();
}

/* 도구 스타일 */
function applyStyle(ctx,t,col,sz,op){
  ctx.globalAlpha=op;ctx.lineWidth=sz;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=t==='erase'?'#ffffff':col;
  ctx.shadowBlur=0;ctx.shadowColor='transparent';
  if(t==='brush'){ctx.lineWidth=sz*1.8;ctx.shadowBlur=sz*0.5;ctx.shadowColor=col;}
  else if(t==='crayon'){ctx.lineWidth=sz*1.2;ctx.lineCap='square';ctx.globalAlpha=op*0.7;}
  else if(t==='marker'){ctx.lineWidth=sz*2.2;ctx.lineCap='square';ctx.globalAlpha=op*0.55;}
  else if(t==='water'){ctx.lineWidth=sz*2;ctx.globalAlpha=op*0.28;ctx.shadowBlur=sz*1.5;ctx.shadowColor=col;}
  else if(t==='erase'){ctx.lineWidth=sz*2.5;ctx.globalAlpha=1;}
}

/* 좌표 */
function gp(e){const r=dc.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};}

/* undo */
function saveUndo(){if(undoStack.length>=MAX_UNDO)undoStack.shift();undoStack.push(dctx.getImageData(0,0,dc.width,dc.height));}
function undoC(){if(undoStack.length)dctx.putImageData(undoStack.pop(),0,0);}

/* 그림판 활성화 토글 — 버튼으로 명시적 전환 */
let drawMode = false; // false = 스크롤 모드 / true = 그림 모드

function setDrawMode(active){
  drawMode = active;
  dc.style.touchAction = active ? 'none' : 'pan-y';
  document.getElementById('drawModeBtn').textContent = active ? '✋ 그리기 중 (탭하면 스크롤 모드)' : '✏️ 그리기 시작';
  document.getElementById('drawModeBtn').style.background = active ? '#fff3cd' : '#fafafa';
  document.getElementById('drawModeBtn').style.borderColor = active ? '#f4c842' : '#ddd';
}

/* 마우스 이벤트 — 항상 작동 */
dc.addEventListener('mousedown',e=>{e.preventDefault();startD(gp(e));});
dc.addEventListener('mousemove',e=>{if(drawing)drawMove(gp(e));});
dc.addEventListener('mouseup',()=>endD());
dc.addEventListener('mouseleave',()=>endD());

/* 터치 이벤트 — drawMode일 때만 그리기 */
dc.addEventListener('touchstart',e=>{
  if(!drawMode)return; // 스크롤 모드면 무시(브라우저가 스크롤 처리)
  e.preventDefault();startD(gp(e));
},{passive:false});
dc.addEventListener('touchmove',e=>{
  if(!drawMode||!drawing)return;
  e.preventDefault();drawMove(gp(e));
},{passive:false});
dc.addEventListener('touchend',e=>{
  if(!drawMode)return;
  e.preventDefault();endD();
});

function startD(p){
  if(tool==='fill'){saveUndo();floodFill(Math.round(p.x),Math.round(p.y),color);return;}
  saveUndo();drawing=true;sx=p.x;sy=p.y;lastX=p.x;lastY=p.y;
  const freehand=['pen','brush','crayon','marker','water','erase'];
  if(!freehand.includes(tool))snap=dctx.getImageData(0,0,dc.width,dc.height);
  if(freehand.includes(tool)){
    dctx.save();applyStyle(dctx,tool,color,bsz,opacity);
    dctx.beginPath();dctx.moveTo(p.x,p.y);dctx.lineTo(p.x+.1,p.y+.1);dctx.stroke();dctx.restore();
  }
}
function drawMove(p){
  const freehand=['pen','brush','crayon','marker','water','erase'];
  if(freehand.includes(tool)){
    let dx=p.x,dy=p.y;
    if(tool==='crayon'){dx+=(Math.random()-.5)*bsz*.35;dy+=(Math.random()-.5)*bsz*.35;}
    dctx.save();applyStyle(dctx,tool,color,bsz,opacity);
    dctx.beginPath();dctx.moveTo(lastX,lastY);dctx.lineTo(dx,dy);dctx.stroke();
    if(tool==='water'){
      dctx.globalAlpha=opacity*.07;dctx.lineWidth=bsz*4;
      dctx.beginPath();dctx.moveTo(lastX,lastY);dctx.lineTo(dx,dy);dctx.stroke();
    }
    dctx.restore();lastX=p.x;lastY=p.y;
  } else {
    dctx.putImageData(snap,0,0);
    dctx.save();applyStyle(dctx,tool,color,bsz,opacity);
    if(tool==='line'){dctx.beginPath();dctx.moveTo(sx,sy);dctx.lineTo(p.x,p.y);dctx.stroke();}
    else if(tool==='rect'){dctx.strokeRect(sx,sy,p.x-sx,p.y-sy);}
    else if(tool==='circ'){
      const rx=Math.abs(p.x-sx)/2,ry=Math.abs(p.y-sy)/2,cx=sx+(p.x-sx)/2,cy=sy+(p.y-sy)/2;
      dctx.beginPath();dctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);dctx.stroke();
    }
    dctx.restore();
  }
}
function endD(){drawing=false;}

function setT(t){
  tool=t;
  ['bPen','bBrush','bCrayon','bMarker','bWater','bErase','bLine','bRect','bCirc','bFill'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('on');});
  const m={pen:'bPen',brush:'bBrush',crayon:'bCrayon',marker:'bMarker',water:'bWater',erase:'bErase',line:'bLine',rect:'bRect',circ:'bCirc',fill:'bFill'};
  if(document.getElementById(m[t]))document.getElementById(m[t]).classList.add('on');
  dc.style.cursor=t==='fill'?'cell':'crosshair';
  updatePP();
}
function clearC(){saveUndo();dctx.fillStyle='#ffffff';dctx.fillRect(0,0,CW,CH);}

/* flood fill */
function h2rgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16),255];}
function close4(d,i,t,tol){return Math.abs(d[i]-t[0])<=tol&&Math.abs(d[i+1]-t[1])<=tol&&Math.abs(d[i+2]-t[2])<=tol&&Math.abs(d[i+3]-t[3])<=tol;}
function floodFill(startX,startY,fillHex){
  const img=dctx.getImageData(0,0,dc.width,dc.height),data=img.data,W=dc.width,H=dc.height;
  const px=Math.round(startX*DPR),py=Math.round(startY*DPR);
  if(px<0||px>=W||py<0||py>=H)return;
  const idx=(py*W+px)*4,target=[data[idx],data[idx+1],data[idx+2],data[idx+3]],fill=h2rgb(fillHex);
  if(close4(data,idx,fill,5))return;
  const tol=32,stack=[[px,py]],visited=new Uint8Array(W*H);
  while(stack.length){
    const[x,y]=stack.pop();if(x<0||x>=W||y<0||y>=H)continue;
    const i=(y*W+x)*4;if(visited[y*W+x]||!close4(data,i,target,tol))continue;
    visited[y*W+x]=1;data[i]=fill[0];data[i+1]=fill[1];data[i+2]=fill[2];data[i+3]=255;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  dctx.putImageData(img,0,0);
}

/* ── 완성하기 ── */
function doSubmit(){
  const txt=document.getElementById('diaryTa').value.trim();
  if(!txt){alert('글을 먼저 써 보세요! ✏️');return;}
  const school=document.getElementById('school').value||'';
  const grade=document.getElementById('grade').value;
  const cls=document.getElementById('cls').value||'__';
  const num=document.getElementById('num').value||'__';
  const name=document.getElementById('uname').value||'이름없음';
  const y=document.getElementById('fyear').value,mo=document.getElementById('fmonth').value,d=document.getElementById('fday').value,dow=document.getElementById('fdow').value;
  const wake=document.getElementById('fwake').value||'—',sleep=document.getElementById('fsleep').value||'—';

  document.getElementById('prevMeta').innerHTML=
    '<div>'+school+' '+grade+' '+cls+'반 '+num+'번 <strong>'+name+'</strong></div>'+
    '<div>'+(selWeather||'')+' '+y+'년 '+mo+'월 '+d+'일 '+dow+'</div>'+
    '<div>🌅 일어난 시간: '+wake+'</div><div>🌙 잠든 시간: '+sleep+'</div>';

  buildPreview(txt);
  document.getElementById('diaryBody').style.display='none';
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('previewWrap').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildPreview(txt){
  const pc=document.getElementById('previewCanvas');
  const PW=Math.round(CW),lineH=46,padX=22,padTop=16,fs=22;
  const tmp=document.createElement('canvas');tmp.width=PW;tmp.height=10;
  const tc=tmp.getContext('2d');tc.font=fs+'px Gaegu,cursive';
  const maxW=PW-padX*2,rawLines=txt.split('\n'),lines=[];
  rawLines.forEach(rl=>{
    if(!rl.trim()){lines.push('');return;}
    let line='';
    for(const ch of rl){if(tc.measureText(line+ch).width>maxW){lines.push(line);line=ch;}else line+=ch;}
    lines.push(line);
  });
  const textH=lines.length*lineH+padTop*2+16,totalH=CH+textH+12;
  pc.width=PW;pc.height=totalH;pc.style.width='100%';
  const pctx=pc.getContext('2d');
  pctx.fillStyle='#ffffff';pctx.fillRect(0,0,PW,totalH);
  // 그림
  pctx.drawImage(dc,0,0,dc.width,dc.height,0,0,CW,CH);
  // 구분선
  pctx.strokeStyle='#e8d5a0';pctx.lineWidth=1.5;
  pctx.beginPath();pctx.moveTo(0,CH+6);pctx.lineTo(PW,CH+6);pctx.stroke();
  // 글 영역 배경 (줄 없음)
  const textTop=CH+12;
  pctx.fillStyle='#fffef8';pctx.fillRect(0,textTop,PW,textH);
  // 글씨
  pctx.fillStyle='#111';pctx.font=fs+'px Gaegu,cursive';pctx.textBaseline='top';
  lines.forEach((line,i)=>pctx.fillText(line,padX,textTop+padTop+i*lineH));
}

function goBack(){
  document.getElementById('diaryBody').style.display='block';
  document.getElementById('submitBtn').style.display='block';
  document.getElementById('previewWrap').style.display='none';
}

/* 출력: saveImg와 동일한 레이아웃을 그린 뒤 1장 인쇄 */
function printDiary(){
  // saveImg와 완전히 동일한 캔버스 생성 후 dataURL을 img에 넣고 인쇄
  const dataUrl = buildDiaryCanvas();
  const img = document.getElementById('printImg');
  img.src = dataUrl;
  img.onload = function(){
    document.getElementById('printArea').style.display='flex';
    setTimeout(()=>{
      window.print();
      setTimeout(()=>{
        document.getElementById('printArea').style.display='none';
      }, 1000);
    }, 200);
  };
}

/* ─── 공통 캔버스 렌더러 (저장+출력 모두 사용) ─── */
function buildDiaryCanvas(){
  const S=3; // 배율 (3× ≈ 2100px → 패들렛 고화질)

  /* 입력값 */
  const school=document.getElementById('school').value||'';
  const grade=document.getElementById('grade').value;
  const cls=document.getElementById('cls').value||'';
  const num=document.getElementById('num').value||'';
  const uname=document.getElementById('uname').value||'이름없음';
  const y=document.getElementById('fyear').value;
  const mo=document.getElementById('fmonth').value;
  const d=document.getElementById('fday').value;
  const dow=document.getElementById('fdow').value;
  const wake=document.getElementById('fwake').value||'—';
  const sleep=document.getElementById('fsleep').value||'—';
  const txt=document.getElementById('diaryTa').value||'';

  /* 논리 상수 */
  const LW=Math.round(CW);
  const PAD=14, BORD=2, R=12;
  const p=v=>Math.round(v*S);

  /* 글 줄 계산 */
  const FS=22, LH=40, PX=20, PT=16;
  const maxTW=(LW-PAD*2-PX*2)*S;
  const tmpC=document.createElement('canvas');
  const tc=tmpC.getContext('2d');
  tc.font=(FS*S)+'px Gaegu,cursive';
  const rawL=txt.split('\n'), lines=[];
  rawL.forEach(rl=>{
    if(!rl.trim()){lines.push('');return;}
    let line='';
    for(const ch of rl){
      if(tc.measureText(line+ch).width>maxTW){lines.push(line);line=ch;}
      else line+=ch;
    }
    lines.push(line);
  });
  if(!lines.length)lines.push('');

  /* 섹션 높이 (논리px) */
  const TITLE_H=80;
  const STU_H=52;
  const INFO_H=148;
  const DRAW_H=CH;
  const TEXT_H=lines.length*LH+PT*2+16;
  const GAP=8;
  const bodyH=BORD*2+INFO_H+DRAW_H+TEXT_H;
  const totalLogH=PAD+TITLE_H+GAP+STU_H+GAP+bodyH+PAD;

  const W=LW*S, H=Math.round(totalLogH*S);
  const fc=document.createElement('canvas');
  fc.width=W; fc.height=H;
  const cx=fc.getContext('2d');
  cx.imageSmoothingEnabled=true; cx.imageSmoothingQuality='high';

  /* 배경 */
  cx.fillStyle='#f5f0e0';
  cx.fillRect(0,0,W,H);

  /* 둥근 사각형 helper */
  function rr(x,y,w,h,r){
    cx.beginPath();
    cx.moveTo(p(x+r),p(y));cx.lineTo(p(x+w-r),p(y));
    cx.quadraticCurveTo(p(x+w),p(y),p(x+w),p(y+r));
    cx.lineTo(p(x+w),p(y+h-r));
    cx.quadraticCurveTo(p(x+w),p(y+h),p(x+w-r),p(y+h));
    cx.lineTo(p(x+r),p(y+h));cx.quadraticCurveTo(p(x),p(y+h),p(x),p(y+h-r));
    cx.lineTo(p(x),p(y+r));cx.quadraticCurveTo(p(x),p(y),p(x+r),p(y));
    cx.closePath();
  }

  let cy=PAD;

  /* ① 제목 2줄 */
  cx.fillStyle='#7a4f00';
  cx.font=`bold ${p(19)}px Gaegu,cursive`;
  cx.textBaseline='top'; cx.textAlign='center';
  cx.fillText('✏️ 시간을 표현하는 낱말을 사용하여',p(LW/2),p(cy+6));
  cx.fillText('글쓰기',p(LW/2),p(cy+6+34));
  cy+=TITLE_H+GAP;

  /* ② 학생정보 바 */
  rr(PAD,cy,LW-PAD*2,STU_H,R);
  cx.fillStyle='#fff';cx.fill();
  cx.strokeStyle='#d4b483';cx.lineWidth=p(BORD);cx.stroke();
  cx.textAlign='left';cx.textBaseline='middle';
  cx.fillStyle='#333';cx.font=`${p(16)}px Gaegu,cursive`;
  const smY=cy+STU_H/2;
  let sx0=PAD+16;
  [school,grade,cls?(cls+'반'):'',num?(num+'번'):'',uname].filter(Boolean).forEach((item,i)=>{
    if(i>0){cx.fillStyle='#bbb';cx.fillText(' | ',p(sx0),p(smY));sx0+=cx.measureText(' | ').width/S;}
    cx.fillStyle='#333';cx.fillText(item,p(sx0),p(smY));
    sx0+=cx.measureText(item).width/S+2;
  });
  cy+=STU_H+GAP;

  /* ③ 일기 본체 박스 */
  const bodyX=PAD,bodyW=LW-PAD*2;
  rr(bodyX,cy,bodyW,bodyH,R);
  cx.fillStyle='#fff';cx.fill();
  cx.strokeStyle='#d4b483';cx.lineWidth=p(2.5);cx.stroke();
  cx.save(); rr(bodyX,cy,bodyW,bodyH,R);cx.clip();
  const iX=bodyX+BORD,iW=bodyW-BORD*2;
  cy+=BORD;

  /* ③-a 정보 박스 (노란 배경, 한 칸) */
  cx.fillStyle='#fff9e6';cx.fillRect(p(iX),p(cy),p(iW),p(INFO_H));
  cx.font=`bold ${p(15)}px Gaegu,cursive`;
  cx.fillStyle='#7a4f00';cx.textBaseline='top';cx.textAlign='left';
  cx.fillText('✏️ 나의 글쓰기',p(iX+14),p(cy+10));
  cx.font=`${p(14)}px Gaegu,cursive`;cx.fillStyle='#444';
  const iLine=[grade,cls?(cls+'반'):'',num?(num+'번'):'',uname].filter(Boolean).join(' ');
  cx.fillText(iLine,p(iX+14),p(cy+34));
  cx.fillText(`${y}년 ${mo}월 ${d}일  ${dow}`,p(iX+14),p(cy+56));
  cx.fillText(`🌅 일어난 시간: ${wake}`,p(iX+14),p(cy+80));
  cx.fillText(`🌙 잠든 시간: ${sleep}`,p(iX+14),p(cy+104));
  if(selWeather){cx.fillText('날씨: '+selWeather,p(iX+iW/2),p(cy+80));}
  cx.strokeStyle='#e8d5a0';cx.lineWidth=p(1.5);
  cx.beginPath();cx.moveTo(p(iX),p(cy+INFO_H));cx.lineTo(p(iX+iW),p(cy+INFO_H));cx.stroke();
  cy+=INFO_H;

  /* ③-b 그림 */
  cx.fillStyle='#fff';cx.fillRect(p(iX),p(cy),p(iW),p(DRAW_H));
  cx.drawImage(dc,0,0,dc.width,dc.height,p(iX),p(cy),p(iW),p(DRAW_H));
  cx.strokeStyle='#e8d5a0';cx.lineWidth=p(1.5);
  cx.beginPath();cx.moveTo(p(iX),p(cy+DRAW_H));cx.lineTo(p(iX+iW),p(cy+DRAW_H));cx.stroke();
  cy+=DRAW_H;

  /* ③-c 글 */
  cx.fillStyle='#fffef8';cx.fillRect(p(iX),p(cy),p(iW),p(TEXT_H));
  cx.fillStyle='#111';cx.font=`${p(FS)}px Gaegu,cursive`;
  cx.textBaseline='top';cx.textAlign='left';
  lines.forEach((line,i)=>cx.fillText(line,p(iX+PX),p(cy+PT+i*LH)));

  cx.restore();
  return fc.toDataURL('image/png',1.0);
}

/* ── 저장하기: buildDiaryCanvas로 바로 저장 ── */
function saveImg(){
  const btn=document.getElementById('quickSaveBtn');
  const origText=btn?btn.textContent:'';
  if(btn){btn.textContent='⏳ 저장 중...';btn.disabled=true;}
  setTimeout(function(){
    try{
      const uname=document.getElementById('uname').value||'글쓰기';
      const dataUrl=buildDiaryCanvas();
      const a=document.createElement('a');
      a.download=uname+'_글쓰기.png';
      a.href=dataUrl;
      a.click();
    }catch(e){
      alert('저장 중 오류: '+e.message);
    }finally{
      if(btn){btn.textContent=origText;btn.disabled=false;}
    }
  },120);
}
